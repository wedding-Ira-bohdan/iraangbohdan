<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>Запрошення | Іра та Богдан</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,500;1,600&family=Montserrat:wght@500;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      font-family: 'Cormorant Garamond', serif;
      background-image: url('images/photo7.jpg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      background-color: #fdfaf7;
    }

    .text-layer {
      position: relative;
      width: 85%;
      max-width: 420px;
      aspect-ratio: 1 / 1;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      justify-content: center; 
      align-items: center;
      text-align: center;
      color: #1a1a1a;
      padding: 35px;
      transition: transform 0.3s ease;
    }

    .text-layer:hover {
      transform: scale(1.01);
    }

    .text-layer img {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 15px;
      z-index: 0;
      opacity: 0.98;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }

    .text-layer h1,
    .text-layer p,
    .text-layer .hint {
      position: relative;
      z-index: 1;
    }

    h1 {
      font-size: clamp(24px, 6vw, 30px);
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 25px; 
      line-height: 1.2;
    }

    p {
      font-size: clamp(20px, 5vw, 24px); 
      line-height: 1.4;
      font-style: italic;
      font-weight: 500; 
      color: #1a1a1a;
      max-width: 310px;
      /* Збільшив відступ знизу, щоб опустити підказку ще нижче */
      margin-bottom: 45px; 
    }

    .hint {
      font-family: 'Montserrat', sans-serif;
      font-size: 11px;
      letter-spacing: 2px;
      font-weight: 600;
      text-transform: uppercase;
      border-bottom: 2px solid #1a1a1a;
      padding-bottom: 5px;
      animation: pulse 2s infinite ease-in-out;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.05); opacity: 0.6; }
    }
  </style>
</head>

<body>

  <div class="text-layer" onclick="openSite()" role="button">
    <img src="images/photo8.jpg" alt="Фон">
    
    <h1>Дорогі гості!</h1>
    
    <p>Запрошуємо вас розділити з нами радість особливої для нас події та стати частиною нашої історії</p>
    
    <div class="hint">Відкрити запрошення</div>
  </div>

  <script>
    function openSite() {
      const layer = document.querySelector('.text-layer');
      layer.style.opacity = '0';
      layer.style.transition = 'opacity 0.4s ease';
      
      setTimeout(() => {
        window.location.href = "main.html";
      }, 350);
    }

    window.onpageshow = function(event) {
      document.querySelector('.text-layer').style.opacity = '1';
    };
  </script>

</body>
</html>
