<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>Запрошення</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,500;1,400&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      /* Змінено на Cormorant Garamond для основної естетики */
      font-family: 'Cormorant Garamond', serif;
      background-image: url('images/photo7.jpg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;

      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .text-layer {
      position: relative;
      width: 85%; /* Трохи збільшив для кращого вигляду тексту */
      max-width: 420px;
      aspect-ratio: 1 / 1;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      color: #1a1a1a;
      padding: 40px;
    }

    .text-layer img {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 2px; /* Менший радіус виглядає більш преміально */
      z-index: 0;
      opacity: 0.95; /* Додав легку прозорість фону під текстом */
    }

    .text-layer h1,
    .text-layer p,
    .text-layer .hint {
      position: relative;
      z-index: 1;
    }

    h1 {
      font-size: clamp(24px, 6vw, 32px);
      margin-bottom: 15px;
      font-weight: 500;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    p {
      font-size: clamp(18px, 4vw, 20px);
      line-height: 1.4;
      font-style: italic;
      font-weight: 300;
      color: #333;
    }

    .hint {
      margin-top: 30px;
      /* Використовуємо Montserrat для сучасного вигляду підказки */
      font-family: 'Montserrat', sans-serif;
      font-size: 11px;
      letter-spacing: 3px;
      font-weight: 400;
      text-transform: uppercase;
      display: inline-block;
      border-bottom: 1px solid #1a1a1a;
      padding-bottom: 5px;
      animation: pulse 2s infinite ease-in-out;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(0.98); }
    }
  </style>
</head>

<body>

  <div class="text-layer" onclick="openSite()" role="button" aria-label="Відкрити головну сторінку">
    <img src="images/photo8.jpg" alt="Декоративний квадрат">
    
    <h1>Дорогі гості!</h1>
    <p>Запрошуємо вас розділити з нами радість особливої для нас події та стати частиною нашої історії</p>
    
    <div class="hint">Відкрити запрошення</div>
  </div>

  <script>
    function openSite() {
      window.location.href = "main.html";
    }

    window.onpageshow = function(event) {
      document.querySelector('.text-layer').style.opacity = '1';
    };
  </script>

</body>
</html>
