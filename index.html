<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>Запрошення | Іра та Богдан</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,500;1,700&family=Montserrat:wght@600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      font-family: 'Cormorant Garamond', serif;
      background-image: url('images/photo7.jpg');
      background-size: cover;          /* Заповнює екран */
      background-position: center center; /* Центрує */
      background-repeat: no-repeat;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .text-layer {
      position: relative;
      width: 88%; 
      max-width: 440px;
      aspect-ratio: 1 / 1;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      justify-content: center; 
      align-items: center;
      text-align: center;
      color: #1a1a1a;
      padding: 30px;
    }

    .text-layer img {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 15px;
      z-index: 0;
      opacity: 0.98;
    }

    .text-layer h1,
    .text-layer p,
    .text-layer .hint {
      position: relative;
      z-index: 1;
    }

    h1 {
      font-size: clamp(26px, 7vw, 34px);
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 30px; 
      line-height: 1.1;
    }

    p {
      font-size: clamp(22px, 6vw, 28px); 
      line-height: 1.3;
      font-style: italic;
      font-weight: 500; 
      color: #1a1a1a;
      max-width: 340px;
      margin-bottom: 30px; 
    }

    .hint {
      font-family: 'Montserrat', sans-serif;
      font-size: 12px;
      letter-spacing: 2px;
      font-weight: 600;
      text-transform: uppercase;
      border-bottom: 2px solid #1a1a1a;
      padding-bottom: 5px;
      margin-top: 10px; 
      animation: pulse 2s infinite ease-in-out;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.05); opacity: 0.6; }
    }
  </style>
</head>

<body>

  <div class="text-layer" onclick="openSite()" role="button">
    <img src="images/photo8.jpg" alt="Фон">
    
    <h1>Дорогі гості!</h1>
    
    <p>Запрошуємо вас розділити з нами радість особливої для нас події та стати частиною нашої історії</p>
    
    <div class="hint">Відкрити запрошення</div>
  </div>

  <script>
    function openSite() {
      window.location.href = "main.html";
    }
  </script>

</body>
</html>
