<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>Запрошення</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,500&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      font-family: 'Playfair Display', serif;
      background-image: url('images/photo7.jpg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;

      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .text-layer {
      position: relative;
      width: 70%;
      max-width: 420px;
      aspect-ratio: 1 / 1;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      color: #1a1a1a;
      text-shadow: 1px 1px 2px rgba(255,255,255,0.3);
    }

    .text-layer img {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 15px;
      z-index: 0;
    }

    .text-layer h1,
    .text-layer p,
    .text-layer .hint {
      position: relative;
      z-index: 1;
    }

    h1 {
      font-size: clamp(22px, 4vw, 28px);
      margin-bottom: 20px;
      font-weight: 400;
    }

    p {
      font-style: italic;
      font-size: clamp(16px, 3.5vw, 18px);
      line-height: 1.6;
    }

    .hint {
      margin-top: 25px;
      font-size: 14px;
      letter-spacing: 1px;
      font-weight: bold;
      text-transform: uppercase;
      display: inline-block;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }

    /* === Панель редагування === */
    #style-panel {
      position: fixed;
      top: 10px;
      right: 10px;
      background: rgba(255,255,255,0.95);
      padding: 10px;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
      z-index: 9999;
      font-family: sans-serif;
      font-size: 14px;
    }

    #style-panel label {
      display: block;
      margin-bottom: 5px;
    }

    #style-panel input {
      width: 100%;
      margin-bottom: 10px;
    }
  </style>
</head>

<body>

  <div class="text-layer" onclick="openSite()" role="button" aria-label="Відкрити головну сторінку">
    <img src="images/photo8.jpg" alt="Декоративний квадрат">
    
    <h1>Дорогі гості!</h1>
    <p>Запрошуємо вас розділити з нами радість особливої для нас події та стати частиною нашої історії</p>
    
    <div class="hint">Відкрити запрошення</div>
  </div>

  <!-- Панель редагування -->
  <div id="style-panel">
    <label>Шрифт заголовка (h1): <input type="text" id="h1-font" value="Playfair Display"></label>
    <label>Розмір заголовка (px): <input type="number" id="h1-size" value="28" min="10" max="100"></label>
    <label>Відстань між h1 і p (px): <input type="number" id="h1-margin" value="20" min="0" max="100"></label>
    <label>Розмір тексту p (px): <input type="number" id="p-size" value="18" min="10" max="100"></label>
    <label>Міжрядковий інтервал p: <input type="number" id="p-line" value="1.6" step="0.1" min="1" max="3"></label>
  </div>

  <script>
    function openSite() {
      window.location.href = "main.html";
    }

    window.onpageshow = function(event) {
      document.querySelector('.text-layer').style.opacity = '1';
    };

    // === JS для панелі редагування ===
    const h1 = document.querySelector('h1');
    const p = document.querySelector('p');

    document.getElementById('h1-font').addEventListener('input', e => {
      h1.style.fontFamily = e.target.value;
    });

    document.getElementById('h1-size').addEventListener('input', e => {
      h1.style.fontSize = e.target.value + 'px';
    });

    document.getElementById('h1-margin').addEventListener('input', e => {
      h1.style.marginBottom = e.target.value + 'px';
    });

    document.getElementById('p-size').addEventListener('input', e => {
      p.style.fontSize = e.target.value + 'px';
    });

    document.getElementById('p-line').addEventListener('input', e => {
      p.style.lineHeight = e.target.value;
    });
  </script>

</body>
</html>
