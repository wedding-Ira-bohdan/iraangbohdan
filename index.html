<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>Запрошення | Іра та Богдан</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,500;1,400&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      font-family: 'Cormorant Garamond', serif;
      /* Головний фон сторінки */
      background-image: url('images/photo7.jpg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      background-color: #fdfaf7; /* Колір-заглушка до завантаження фото */
    }

    .text-layer {
      position: relative;
      width: 85%;
      max-width: 420px;
      aspect-ratio: 1 / 1;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      /* Розподіляємо контент: заголовок вгору, кнопка вниз, текст по центру */
      justify-content: space-between; 
      align-items: center;
      text-align: center;
      color: #1a1a1a;
      padding: 60px 35px; /* Вертикальні відступи створюють "повітря" */
      transition: transform 0.3s ease;
    }

    .text-layer:hover {
      transform: scale(1.02);
    }

    .text-layer img {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 15px; /* Твої закруглені кути */
      z-index: 0;
      opacity: 0.98;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }

    .text-layer h1,
    .text-layer p,
    .text-layer .hint {
      position: relative;
      z-index: 1;
    }

    h1 {
      font-size: clamp(20px, 5vw, 26px);
      font-weight: 500;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #2c2c2c;
    }

    p {
      font-size: clamp(17px, 4vw, 20px);
      line-height: 1.5;
      font-style: italic;
      font-weight: 400;
      color: #333;
      max-width: 280px; /* Обмеження ширини для кращого вигляду */
    }

    .hint {
      font-family: 'Montserrat', sans-serif;
      font-size: 10px;
      letter-spacing: 3px;
      font-weight: 400;
      text-transform: uppercase;
      border-bottom: 1px solid #1a1a1a;
      padding-bottom: 6px;
      animation: pulse 2s infinite ease-in-out;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: translateY(0); }
      50% { opacity: 0.5; transform: translateY(2px); }
    }
  </style>
</head>

<body>

  <div class="text-layer" onclick="openSite()" role="button" aria-label="Відкрити запрошення">
    <img src="images/photo8.jpg" alt="Фон">
    
    <h1>Дорогі гості!</h1>
    
    <p>Запрошуємо вас розділити з нами радість особливої для нас події та стати частиною нашої історії</p>
    
    <div class="hint">Відкрити запрошення</div>
  </div>

  <script>
    function openSite() {
      // Плавний перехід на головну сторінку
      const layer = document.querySelector('.text-layer');
      layer.style.opacity = '0';
      layer.style.transition = 'opacity 0.5s ease';
      
      setTimeout(() => {
        window.location.href = "main.html";
      }, 400);
    }

    // Відновлення видимості при поверненні кнопкою "Назад"
    window.onpageshow = function(event) {
      document.querySelector('.text-layer').style.opacity = '1';
    };
  </script>

</body>
</html>
